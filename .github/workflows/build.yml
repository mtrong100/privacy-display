name: Build Privacy Display APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p output
          find app/build/outputs/apk/debug -name "*.apk" -exec cp {} output/privacy-display.apk \;
          ls -lh output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: privacy-display
          path: output/privacy-display.apk
          retention-days: 30

      - name: Build summary
        run: echo "✅ privacy-display.apk built successfully" >> $GITHUB_STEP_SUMMARY
